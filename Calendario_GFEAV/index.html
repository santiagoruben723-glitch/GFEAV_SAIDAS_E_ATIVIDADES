<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GFEAV · Calendário de Saídas e Atividades</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-pattern"></div>
  <div class="header-inner">
    <img src="logo.png" alt="Logo GFEAV" class="header-logo">

    <div class="header-badge">Saídas e Atividades</div>

    <h1 id="groupName">Grupo Folclórico e Etnográfico de Albergaria-a-Velha</h1>

    <p class="header-sub" id="groupSub">Fundado a 1 de janeiro de 1984</p>
  </div>

  <nav>
    <button class="active" onclick="showTab('calendario')">📅 Calendário</button>
    <button onclick="showTab('atividades')">📋 Atividades</button>
    <button onclick="showTab('definicoes')">⚙️ Definições</button>
  </nav>
</header>

<main>
  <section id="tab-calendario" class="tab-section active">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-icon">❧</div>
      <div class="ornament-line"></div>
    </div>

    <div class="view-controls">
      <div class="calendar-header" style="flex:1; margin-bottom:0">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="setCalView('month', this)">Mês</button>
        <button class="toggle-btn" onclick="setCalView('list', this)">Lista</button>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Ensaio</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--terracotta)"></div> Atuação</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Reunião</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--brown-mid)"></div> Outro</div>
    </div>

    <div id="calView">
      <div class="calendar-grid">
        <div class="cal-days-header">
          <div class="cal-day-name">Dom</div><div class="cal-day-name">Seg</div><div class="cal-day-name">Ter</div><div class="cal-day-name">Qua</div><div class="cal-day-name">Qui</div><div class="cal-day-name">Sex</div><div class="cal-day-name">Sáb</div>
        </div>
        <div class="cal-body" id="calBody"></div>
      </div>
    </div>

    <div id="listView" style="display:none">
      <div id="listViewEvents"></div>
    </div>
  </section>

  <section id="tab-atividades" class="tab-section">
    <div class="events-list" id="allEventsList"></div>
  </section>
<section id="tab-definicoes" class="tab-section">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-icon">⚙️</div>
      <div class="ornament-line"></div>
    </div>

    <div class="settings-container">
      <div class="form-group">
        <label>Nome do Grupo</label>
        <input type="text" id="settingName">
      </div>
      <div class="form-group">
        <label>Subtítulo / Fundação</label>
        <input type="text" id="settingSubtitle">
      </div>
      <div class="form-group">
        <label>Sobre o Grupo</label>
        <textarea id="settingAbout" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Sede / Local</label>
        <input type="text" id="settingLocal">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Contacto</label>
          <input type="text" id="settingContact">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="settingEmail">
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Guardar Definições</button>
    </div>
  </section>
</main>

<button class="fab" onclick="openModal()" title="Adicionar Atividade">＋</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2 id="modalTitleText" class="section-title">Nova Atividade</h2>
    <input type="hidden" id="editingId">

    <div class="form-group">
      <label>Título da Atividade</label>
      <input type="text" id="formTitle" placeholder="Ex: Ensaio Geral">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="formDate">
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="formTime">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Tipo</label>
        <select id="formTipo">
          <option value="ensaio">Ensaio</option>
          <option value="atuacao">Atuação</option>
          <option value="reuniao">Reunião</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Local</label>
        <input type="text" id="formLocal" placeholder="Ex: Sede do Grupo">
      </div>
    </div>

    <div class="form-group">
      <label>Descrição / Observações</label>
      <textarea id="formDesc" rows="3" placeholder="Informações adicionais..."></textarea>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 24px;">
      <button class="btn btn-secondary" style="flex: 1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex: 1" onclick="saveEvent()">Guardar</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand" id="footerBrand">Grupo Folclórico e Etnográfico de Albergaria-a-Velha</div>
  <div>Calendário de Atividades · Feito por Rúben Santiago </div>
</footer>

<script src="script.js"></script>
</body>
</html>
